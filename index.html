  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Assistant</title>
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-4xl mx-auto mt-10 bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col h-[90vh]">
        <!-- Header -->
        <div class="bg-indigo-600 p-4 flex items-center justify-between text-white">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">UR AI HELPER</h1>
                    <span class="text-xs text-indigo-200">● Online | Ultra Fast</span>
                </div>
            </div>
            <button class="hover:bg-indigo-700 p-2 rounded-full transition"><i class="fas fa-ellipsis-v"></i></button>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="chat-container overflow-y-auto p-6 space-y-4 flex-grow">
            <!-- Welcome Message -->
            <div class="flex justify-start">
                <div class="ai-msg p-4 max-w-[80%] shadow-sm">
                    Hello! I'm powered by Gemini Flash. How can I assist you today?
                </div>
            </div>
        </div>

        <!-- Emoji Picker Popup -->
        <div id="emoji-picker" class="absolute bottom-24 left-10 bg-white border rounded-lg shadow-xl p-2 grid grid-cols-6 gap-2 z-50">
            <button onclick="addEmoji('😊')" class="hover:bg-gray-100 p-1 rounded">😊</button>
            <button onclick="addEmoji('😂')" class="hover:bg-gray-100 p-1 rounded">😂</button>
            <button onclick="addEmoji('🔥')" class="hover:bg-gray-100 p-1 rounded">🔥</button>
            <button onclick="addEmoji('👍')" class="hover:bg-gray-100 p-1 rounded">👍</button>
            <button onclick="addEmoji('✨')" class="hover:bg-gray-100 p-1 rounded">✨</button>
            <button onclick="addEmoji('🤔')" class="hover:bg-gray-100 p-1 rounded">🤔</button>
            <button onclick="addEmoji('🚀')" class="hover:bg-gray-100 p-1 rounded">🚀</button>
            <button onclick="addEmoji('💡')" class="hover:bg-gray-100 p-1 rounded">💡</button>
        </div>

        <!-- Input Area -->
        <div class="border-t p-4 bg-gray-50">
            <div class="flex items-center bg-white border rounded-xl px-4 py-2 focus-within:ring-2 focus-within:ring-indigo-500 transition shadow-sm">
                <button onclick="toggleEmoji()" class="text-gray-400 hover:text-indigo-600 mr-3">
                    <i class="far fa-smile text-xl"></i>
                </button>
                <input type="text" id="user-input" placeholder="Type a message..." class="w-full focus:outline-none text-gray-700 py-2">
                <button id="send-btn" class="ml-3 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition flex items-center">
                    <span>Send</span>
                    <i class="fas fa-paper-plane ml-2 text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
    <script type="module" src="./script.js"></script>

  </body>
  
</html>
